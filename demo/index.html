<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tillefeuille map demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17202a;
        background: #eef2f6;
      }

      body {
        margin: 0;
      }

      #app {
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
        height: 100vh;
        min-height: 620px;
      }

      aside {
        box-sizing: border-box;
        border-right: 1px solid #c8d1dc;
        background: #ffffff;
        padding: 18px;
        overflow: auto;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 14px;
        color: #52606d;
        font-size: 14px;
        line-height: 1.45;
      }

      label {
        display: block;
        margin: 16px 0 8px;
        color: #334155;
        font-size: 13px;
        font-weight: 700;
      }

      textarea,
      pre {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #c8d1dc;
        border-radius: 8px;
        background: #f9fbfd;
        color: #17202a;
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      textarea {
        min-height: 220px;
        padding: 12px;
        resize: vertical;
      }

      pre {
        min-height: 120px;
        max-height: 220px;
        margin: 0;
        overflow: auto;
        padding: 12px;
        white-space: pre-wrap;
      }

      .controls {
        display: flex;
        gap: 8px;
        margin: 12px 0 16px;
      }

      button {
        min-height: 38px;
        border: 1px solid #0f6b5f;
        border-radius: 8px;
        background: #117d6f;
        color: #ffffff;
        padding: 0 14px;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        border-color: #b6c2cf;
        background: #ffffff;
        color: #26323f;
      }

      #map {
        min-width: 0;
        height: 100vh;
        min-height: 620px;
      }

      @media (max-width: 820px) {
        #app {
          grid-template-columns: 1fr;
          grid-template-rows: 390px minmax(520px, 1fr);
          height: auto;
        }

        aside {
          border-right: 0;
          border-bottom: 1px solid #c8d1dc;
        }

        #map {
          height: 70vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside>
        <h1>tillefeuille</h1>
        <p>MapLibre requests merged vector tiles through a custom protocol backed by the library API.</p>

        <label for="sources">Sources</label>
        <textarea id="sources" spellcheck="false"></textarea>
        <div class="controls">
          <button id="apply" type="button">Apply</button>
          <button id="reset" class="secondary" type="button">Reset</button>
        </div>

        <label for="inspect">Clicked features</label>
        <pre id="inspect">Click a feature on the map.</pre>
      </aside>
      <div id="map"></div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
